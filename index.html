<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武子硕 | 个人主页</title>
    <!-- 引入图标库，不用本地图片 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 渐变高级背景，告别纯白空白 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: "Microsoft Yahei", system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* 主卡片容器 */
        .card {
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            border-radius: 24px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            /* 悬浮上浮动画 */
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
        }
        /* 圆形头像 */
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #e8e4ff;
            margin-bottom: 20px;
        }
        h1 {
            color: #222;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 17px;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        /* 技术标签行 */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 35px;
        }
        .tag {
            background: #f0eaff;
            color: #6c5ce7;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 14px;
        }
        /* 链接按钮 */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            text-decoration: none;
            font-size: 17px;
            border-radius: 14px;
            color: white;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: opacity 0.2s;
        }
        .link-item:hover {
            opacity: 0.85;
        }
        /* 底部小字 */
        .footer-text {
            margin-top: 40px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 头像，替换src为你的图片链接 -->
        <img class="avatar" src="https://avatars.githubusercontent.com/u/583231?v=4" alt="头像">
        <h1>武子硕</h1>
        <p class="subtitle">北大生命科学｜生物/编程爱好者｜iGEM参赛选手</p>

        <!-- 技能标签，按需增删 -->
        <div class="tags">
            <span class="tag">生物实验</span>
            <span class="tag">Python</span>
            <span class="tag">合成生物学</span>
            <span class="tag">数据分析</span>
        </div>

        <!-- 社交链接 -->
        <a class="link-item" href="https://github.com/wuzishuo">
            <i class="fa-brands fa-github"></i> 我的GitHub
        </a>
        <a class="link-item" href="mailto:xxx@qq.com">
            <i class="fa-solid fa-envelope"></i> 联系邮箱
        </a>
        <a class="link-item" href="#">
            <i class="fa-solid fa-flask"></i> 科研项目
        </a>

        <div class="footer-text">
            Powered by GitHub Pages · 2026
        </div>
    </div>
</body>
</html>
